name: CI and Release

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  HOOVERSION_VERSION: 0.1.1

jobs:
  commitlint:
    name: Lint commits
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Lint commits
        uses: openhoo/hooversion/actions/lint@v0.1.1
        with:
          version: ${{ env.HOOVERSION_VERSION }}
          bun-version: 1.3.14

  build:
    name: Test and build
    runs-on: ubuntu-latest
    needs: commitlint
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run checks
        run: bun run check

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Release
        id: release
        uses: openhoo/hooversion/actions/release@v0.1.1
        with:
          version: ${{ env.HOOVERSION_VERSION }}
          bun-version: 1.3.14
          github-token: ${{ secrets.GITHUB_TOKEN }}
          install-command: bun install --frozen-lockfile

      # npm trusted publishing/provenance currently requires npm publish;
      # dependency installation and project scripts stay on Bun.
      - name: Set up Node for npm
        if: steps.release.outputs.published == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Check published package version
        if: steps.release.outputs.published == 'true'
        id: package
        env:
          PACKAGE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          if bun info "@openhoo/mouserhoo@${PACKAGE_VERSION}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish package to npm
        if: steps.release.outputs.published == 'true' && steps.package.outputs.exists != 'true'
        run: npm publish --access public --provenance
